name: yellow_finance
description: "YellowFinance — Personal finance tracker with AI insights."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0

  # Google Sign-In
  google_sign_in: ^7.2.0

  # State & Navigation
  get: ^4.6.6

  # Networking
  dio: ^5.4.0
  connectivity_plus: ^6.0.0

  # Secure Storage
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.2.0

  # Charts
  fl_chart: ^1.2.0

  # UI
  intl: ^0.20.2

  # Utils
  uuid: ^4.3.0
  equatable: ^2.0.5

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_native_splash:
  color: "#111111"
  image: assets/images/YellowFinanceLogo3.png
  android_12:
    color: "#111111"
    image: assets/images/YellowFinanceLogo3.png
  ios: true
  android: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/YellowFinanceLogo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
