name: yellow_finance
description: "YellowFinance — Personal finance tracker with AI insights."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_app_check: ^0.3.0
  cloud_functions: ^5.0.0

  # Google Sign-In
  google_sign_in: ^6.2.0

  # State & Navigation
  get: ^4.6.6

  # Networking
  dio: ^5.4.0

  # Secure Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.0

  # Charts
  fl_chart: ^0.68.0

  # UI
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Utils
  uuid: ^4.3.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/YellowFinanceLogo.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
